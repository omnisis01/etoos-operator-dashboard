<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>데이터 업로드 — 이투스ECI 운영자 대시보드</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard Variable',Pretendard,system-ui,sans-serif;min-height:100vh;color:#EDEFF8;padding:48px 20px;
    background:radial-gradient(900px 600px at 15% -5%,rgba(124,58,237,.22),transparent 60%),
               radial-gradient(800px 600px at 100% 110%,rgba(34,211,238,.10),transparent 55%),#13141F}
  .wrap{max-width:760px;margin:0 auto}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
  h1{font-size:24px;font-weight:800;letter-spacing:-.3px}
  .sub{font-size:14px;color:#6E7392;margin-top:6px}
  .back{font-size:14px;font-weight:700;color:#A66BFF;text-decoration:none}
  .card{background:#1C1D2B;border:1px solid #2C2F45;border-radius:20px;padding:28px 30px;box-shadow:0 12px 40px rgba(0,0,0,.4);margin-bottom:22px}
  .step{font-size:12px;font-weight:800;color:#22D3EE;letter-spacing:1px;margin-bottom:10px}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .btn{border:none;border-radius:12px;padding:13px 22px;font-family:inherit;font-size:14.5px;font-weight:700;cursor:pointer;transition:.15s}
  .btn.primary{background:linear-gradient(135deg,#A66BFF,#7C3AED);color:#fff;box-shadow:0 8px 22px rgba(124,58,237,.38)}
  .btn.ghost{background:#23253A;color:#A6ABC8;border:1px solid #2C2F45}
  .btn:active{transform:translateY(1px)}
  .drop{margin-top:14px;border:2px dashed #3A3D5A;border-radius:14px;padding:34px;text-align:center;color:#6E7392;font-size:14px;cursor:pointer;transition:.15s}
  .drop.over{border-color:#A66BFF;background:rgba(166,107,255,.06);color:#EDEFF8}
  .drop b{color:#A66BFF}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
  th,td{padding:8px 10px;border-bottom:1px solid #24263A;text-align:left;color:#A6ABC8}
  th{color:#6E7392;font-weight:700}
  td.v{color:#fff;font-weight:700;text-align:right}
  .msg{margin-top:16px;font-size:14px;padding:13px 16px;border-radius:12px;display:none}
  .msg.ok{display:block;background:rgba(52,211,153,.12);color:#34D399;border:1px solid rgba(52,211,153,.3)}
  .msg.err{display:block;background:rgba(248,113,113,.12);color:#F87171;border:1px solid rgba(248,113,113,.3)}
  .hint{font-size:13px;color:#6E7392;margin-top:10px;line-height:1.6}
  select{background:#13141F;border:1px solid #2C2F45;border-radius:10px;color:#EDEFF8;padding:11px 14px;font-family:inherit;font-size:14px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>데이터 업로드</h1>
        <div class="sub" id="who">ERP에서 내려받은 엑셀을 올리면 대시보드가 갱신됩니다.</div>
      </div>
      <a class="back" href="index.html">← 대시보드로</a>
    </div>

    <div class="card">
      <div class="step">STEP 1 · 데이터 종류</div>
      <div class="row">
        <select id="dataset" onchange="onDataset()">
          <option value="snapshot">월간 운영지표 (재원생·매출·출결 KPI)</option>
          <option value="churn">퇴원위험 요인 (학생별 — 출결·순공·성적·미납·부정어·커뮤니티)</option>
          <option value="outcome">퇴원 확정 (실제 퇴원 학생 기록)</option>
        </select>
        <button class="btn ghost" id="tplBtn">📄 템플릿 다운로드</button>
      </div>
      <div class="hint" id="dsHint"></div>
    </div>

    <div class="card">
      <div class="step">STEP 2 · 파일 업로드</div>
      <div class="drop" id="drop">엑셀(.xlsx) 또는 CSV 파일을 <b>드래그</b>하거나 클릭해서 선택<input id="file" type="file" accept=".xlsx,.xls,.csv" hidden></div>
      <div id="preview"></div>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=hq27"></script>
  <script src="lib/supabase.js?v=hq27"></script>
  <script src="lib/auth.js?v=hq27"></script>
  <script src="lib/data.js?v=hq27"></script>
  <script>
  // ── 데이터셋 정의 ─────────────────────────────────────────
  const DATASETS = {
    snapshot: {
      label:'월간 운영지표', table:'metrics_snapshot', mode:'single', conflict:'branch_id',
      cols:{ "재원생수":"total_students","N수":"n_repeat","재학생":"n_current","좌석점유율":"occupancy",
        "당월매출":"mtd_revenue","미납액":"unpaid_total","미납건수":"unpaid_count",
        "금일등원":"attend_present","금일지각":"attend_late","금일결석":"attend_absent",
        "장기결석":"attend_long","휴원":"attend_onleave",
        "주등록":"week_enroll","주퇴원":"week_withdraw","월등록":"month_enroll","월퇴원":"month_withdraw" },
      tpl:'월간운영지표_템플릿.xlsx',
      hint:'1행=머리글, 2행=값. 템플릿에 현재 DB값이 채워져 나옵니다.'
    },
    churn: {
      label:'퇴원위험 요인', table:'churn_factors', mode:'multi', textCols:['student_name'],
      cols:{ "학생명":"student_name","결석지각률":"absence_rate","순공달성률":"study_pct","성적하락등급":"grade_delta","미납일수":"unpaid_days","상담부정어":"neg_score","커뮤니티부정":"community_neg" },
      tpl:'퇴원위험요인_템플릿.xlsx',
      sample:[{학생명:'홍○○',결석지각률:28,순공달성률:25,성적하락등급:2,미납일수:31,상담부정어:60,커뮤니티부정:80},
              {학생명:'김○○',결석지각률:18,순공달성률:55,성적하락등급:1,미납일수:0,상담부정어:20,커뮤니티부정:0}],
      hint:'학생 1명당 1행. 결석지각률·순공달성률은 %, 성적하락등급은 하락폭(0=변화없음), 미납일수는 일, 상담부정어·커뮤니티부정은 0~100 강도 점수. 위험점수는 6대 팩터 가중치(이탈의도 중심)로 자동 계산됩니다.'
    },
    outcome: {
      label:'퇴원 확정', mode:'outcome', textCols:['student_name','withdraw_date'],
      cols:{ "학생명":"student_name","퇴원일":"withdraw_date" },
      tpl:'퇴원확정_템플릿.xlsx',
      sample:[{학생명:'홍○○',퇴원일:'2026-06-18'}],
      hint:'실제 퇴원한 학생을 기록하면, 그 시점의 6개 위험요인 값과 위험점수가 함께 보관됩니다. 나중에 "어떤 신호가 실제 퇴원을 앞섰는지" 분석·보정하는 기준 자료가 됩니다. ※ 해당 학생이 먼저 \'퇴원위험 요인\'에 등록돼 있어야 값이 잡힙니다.'
    }
  };
  let profile;
  const ds = () => DATASETS[document.getElementById('dataset').value];

  (async function init(){
    profile = await requireAuth();
    if(!profile) return;
    document.getElementById('who').textContent =
      `${profile.branch_name || '전사'} · ${profile.name} — 올린 데이터는 이 지점에 반영됩니다.`;
    onDataset();
  })();
  function onDataset(){ document.getElementById('dsHint').textContent = ds().hint; document.getElementById('preview').innerHTML=''; showMsg('',''); }

  // ── 템플릿 다운로드 ───────────────────────────────────────
  document.getElementById('tplBtn').onclick = async () => {
    const d = ds(); const headers = Object.keys(d.cols);
    let rows;
    if(d.mode==='single'){
      let cur = {};
      if(!window.USE_MOCK && profile?.branch_id){
        const { data } = await sb.from(d.table).select('*').eq('branch_id', profile.branch_id).maybeSingle();
        cur = data || {};
      }
      const row = {}; headers.forEach(h => row[h] = cur[d.cols[h]] ?? ''); rows=[row];
    } else { rows = d.sample || [Object.fromEntries(headers.map(h=>[h,'']))]; }
    const ws = XLSX.utils.json_to_sheet(rows, { header: headers });
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, d.label);
    XLSX.writeFile(wb, d.tpl);
  };

  // ── 파일 처리 ─────────────────────────────────────────────
  const drop = document.getElementById('drop'), fileInput = document.getElementById('file');
  drop.onclick = () => fileInput.click();
  drop.ondragover = e => { e.preventDefault(); drop.classList.add('over'); };
  drop.ondragleave = () => drop.classList.remove('over');
  drop.ondrop = e => { e.preventDefault(); drop.classList.remove('over'); if(e.dataTransfer.files[0]) handle(e.dataTransfer.files[0]); };
  fileInput.onchange = e => { if(e.target.files[0]) handle(e.target.files[0]); };
  function showMsg(kind, html){ const m=document.getElementById('msg'); m.className='msg '+(kind||''); m.innerHTML=html; m.style.display=kind?'block':'none'; }
  const num = (v)=> Number(String(v).replace(/[, ]/g,'')) || 0;

  async function handle(file){
    showMsg('', ''); document.getElementById('preview').innerHTML='';
    try {
      const d = ds(); const cols = d.cols; const headers = Object.keys(cols);
      const wb = XLSX.read(await file.arrayBuffer());
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval:'' });
      if(!rows.length) return showMsg('err','데이터 행이 없습니다.');

      // 각 행 → DB 레코드 매핑
      const recs = [];
      for(const r of rows){
        const rec = { branch_id: profile?.branch_id };
        let used=0;
        for(const h of headers){
          if(h in r && r[h] !== ''){
            rec[cols[h]] = (d.textCols||[]).includes(cols[h]) ? String(r[h]).trim() : num(r[h]); used++;
          }
        }
        if(used) recs.push(rec);
      }
      if(!recs.length) return showMsg('err',`열 이름이 템플릿과 일치하지 않습니다. (예: ${headers.slice(0,3).join(', ')} …)`);

      // 미리보기
      const head = `<tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr>`;
      const body = recs.slice(0,5).map(rec=>`<tr>${headers.map(h=>`<td>${rec[cols[h]]??''}</td>`).join('')}</tr>`).join('');
      document.getElementById('preview').innerHTML = `<table>${head}${body}</table>` + (recs.length>5?`<div class="hint">외 ${recs.length-5}행</div>`:'');

      if(window.USE_MOCK) return showMsg('ok', `미리보기 완료 (${recs.length}행). 실서버 연결 시 저장됩니다.`);
      if(!profile.branch_id) return showMsg('err','임원 계정은 지점 원장 계정으로 업로드하세요.');

      if(d.mode==='outcome'){
        // 퇴원 라벨: 학생별로 현재 위험요인을 스냅샷 + 위험점수 계산해 churn_outcomes 적재
        let okN=0; const fails=[];
        for(const rec of recs){
          const r = await DATA.recordChurnByName(profile.branch_id, rec.student_name, rec.withdraw_date||null);
          if(r.ok) okN++; else fails.push(`${rec.student_name}(${r.error})`);
        }
        return showMsg(fails.length?'err':'ok',
          `퇴원 기록 ${okN}건 저장 완료${fails.length?` · 실패 ${fails.length}건: ${fails.join(', ')}`:''}`);
      }

      if(d.mode==='single'){
        const { error } = await sb.from(d.table).upsert(recs[0], { onConflict:d.conflict });
        if(error) return showMsg('err','저장 실패: '+error.message);
      } else {
        // 멀티: 지점의 기존 데이터 교체
        await sb.from(d.table).delete().eq('branch_id', profile.branch_id);
        const { error } = await sb.from(d.table).insert(recs);
        if(error) return showMsg('err','저장 실패: '+error.message);
      }
      showMsg('ok', `✅ ${recs.length}건 저장 완료! <a href="index.html" style="color:#fff;text-decoration:underline">대시보드에서 확인 →</a>`);
    } catch(e){ showMsg('err','파일 처리 오류: '+e.message); }
  }
  </script>
</body>
</html>
