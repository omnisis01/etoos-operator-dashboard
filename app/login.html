<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>247 운영 OS 대시보드 — 로그인</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard Variable',Pretendard,system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(900px 600px at 15% -5%,rgba(124,58,237,.25),transparent 60%),
               radial-gradient(800px 600px at 100% 110%,rgba(34,211,238,.12),transparent 55%),#13141F;color:#EDEFF8}
  .card{width:380px;background:#1C1D2B;border:1px solid #2C2F45;border-radius:20px;padding:40px 36px;box-shadow:0 20px 60px rgba(0,0,0,.45)}
  .brand{font-size:24px;font-weight:800;letter-spacing:-.3px}
  .sub{font-size:13px;color:#6E7392;margin:6px 0 28px}
  label{display:block;font-size:13px;font-weight:600;color:#A6ABC8;margin:16px 0 7px}
  input{width:100%;background:#13141F;border:1px solid #2C2F45;border-radius:11px;padding:13px 15px;color:#EDEFF8;font-family:inherit;font-size:15px;outline:none}
  input:focus{border-color:#A66BFF}
  .btn{width:100%;margin-top:26px;border:none;border-radius:12px;padding:14px;font-family:inherit;font-size:15px;font-weight:700;color:#fff;cursor:pointer;
    background:linear-gradient(135deg,#A66BFF,#7C3AED);box-shadow:0 8px 22px rgba(124,58,237,.4)}
  .btn:active{transform:translateY(1px)}
  .err{margin-top:14px;font-size:13px;color:#F87171;min-height:18px}
  .hint{margin-top:18px;font-size:12px;color:#6E7392;line-height:1.6;border-top:1px solid #24263A;padding-top:16px}
</style>
</head>
<body>
  <form class="card" id="loginForm">
    <div class="brand">247 운영 OS</div>
    <div class="sub" id="sub">운영자 대시보드 로그인</div>
    <label for="email">이메일</label>
    <input id="email" type="email" autocomplete="username" placeholder="director@etoos.com" required>
    <label for="pw">비밀번호</label>
    <input id="pw" type="password" autocomplete="current-password" placeholder="••••••••" required>
    <button class="btn" type="submit">로그인</button>
    <div class="err" id="err"></div>
    <div class="hint" id="hint"></div>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=hq30"></script>
  <script src="lib/supabase.js?v=hq30"></script>
  <script src="lib/auth.js?v=hq30"></script>
  <script>
    if (window.USE_MOCK) {
      document.getElementById("sub").textContent = "데모 시연 — 예시 데이터";
      document.getElementById("email").value = "demo@etoos.com";
      document.getElementById("pw").value = "demo2026";
      document.getElementById("hint").innerHTML =
        "🟢 <b>데모 모드</b> — 실제 지점 데이터가 아닌 <b>예시 데이터</b>입니다.<br>아래 데모 계정(또는 아무 값)으로 <b>로그인</b>을 누르면 데모 대시보드로 이동합니다.";
    }
    // 이미 로그인된 상태(세션 유효)면 대시보드로 자동 복귀 — 뒤로가기로 와도 로그아웃처럼 보이지 않게
    (async () => {
      if (!window.USE_MOCK && window.sb) {
        const { data: { session } } = await sb.auth.getSession();
        if (session) location.replace("index.html" + location.search);
      }
    })();
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const err = document.getElementById("err"); err.textContent = "";
      const { error } = await signIn(email.value, pw.value);
      if (error) { err.textContent = "로그인 실패: " + error.message; return; }
      location.href = "index.html" + location.search;   // ?mock=1 등 유지
    });
  </script>
</body>
</html>
